problem: burgers
experiment:
  name: burgers_dataset_shock_smoke
  seed: 42
  output_dir: artifacts
data:
  path: data/processed/burgers/burgers_dataset.h5
  regime: shock
  normalize: true
solver:
  nx: 128
  length: 1.0
  t_start: 0.0
  t_end: 0.30
  snapshot_dt: 0.01
  cfl: 0.35
  boundary_condition: periodic
  initial_condition: tanh_front
  cases:
    - {nu: 0.02, amplitude: 1.0, front_location: 0.25, front_width: 0.08, initial_condition: sinusoidal}
    - {nu: 0.002, amplitude: 1.0, front_location: 0.25, front_width: 0.025, initial_condition: tanh_front}
    - {nu: 0.0015, amplitude: 1.0, front_location: 0.30, front_width: 0.020, initial_condition: shock}
plot:
  dpi: 300
  save_pdf: true
  save_png: true
