problem: burgers
experiment:
  name: burgers_ae_latent8
  seed: 42
  output_dir: artifacts
data:
  path: data/processed/burgers/burgers_dataset.h5
  case_index: 1
  normalize: true
model:
  method: autoencoder
  latent_dim: 8
  hidden_dim: 32
  hidden_channels: 16
  loss_weights:
    mse: 1.0
    gradient: 0.0
    front_weighted: 0.0
training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 600
  patience: 50
  device: auto
  num_workers: 0
  checkpoint_interval: 25
  mixed_precision: false
evaluation:
  front_method: max_gradient
  rollout_start_index: 18
  error_threshold: 0.2
plot:
  dpi: 300
  save_pdf: true
