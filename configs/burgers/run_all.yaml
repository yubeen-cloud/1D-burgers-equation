steps:
  - script: scripts/prepare_pdebench_burgers.py
    config: configs/burgers/pdebench_prepare.yaml
  - script: scripts/train_pod.py
    config: configs/burgers/pdebench_pod.yaml
  - script: scripts/train_dmd.py
    config: configs/burgers/pdebench_dmd.yaml
  - script: scripts/train_autoencoder.py
