problem: burgers
experiment:
  name: burgers_pod_rom_rank8
  seed: 42
  output_dir: artifacts
data:
  path: data/processed/burgers/burgers_dataset.h5
  case_index: 24
model:
  method: pod_rom
  rank: 8
  subtract_mean: true
  modal_damping: 0.0
solver:
  cfl: 0.20
  boundary_condition: periodic
evaluation:
  front_method: max_gradient
  error_threshold: 0.2
plot:
  dpi: 300
  save_pdf: true
