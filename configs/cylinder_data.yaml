problem: cylinder
experiment:
  name: cylinder_synthetic_re100_150_200
  seed: 42
  output_dir: artifacts
data:
  source: synthetic
  path: data/processed/cylinder/cylinder_synthetic.h5
  reynolds_numbers: [100, 150, 200]
  nx: 48
  ny: 24
  nt: 60
  dt: 0.05
  temporal_split: [0.6, 0.2, 0.2]
  generalization_split:
    train: [100, 150]
    test: [200]
preprocessing:
  field: vorticity
  normalize: true
  crop: null
  mask_cylinder: true
